name: Deploy writer function

# The `writer` Edge Function is the ONLY write path the browser has, and until
# now it was deployed by hand-copying ~600 lines of index.ts into a deploy call.
# That made the repo the source of truth everywhere except the one file where
# being wrong is most expensive — and it has already twice pushed a fix into
# "later" purely because deploying meant retyping the file.
#
# Now: touch supabase/functions/**, and this ships it.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-writer.yml'
  workflow_dispatch:

concurrency:
  group: deploy-writer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy the writer
        id: deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set — refusing to run. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # --no-verify-jwt is REQUIRED and deliberate: this function's auth is the
          # writer token in the x-writer-token header, checked against app_secrets.
          # Deploying with JWT verification on would 401 every write from the
          # dashboard. See PROJECT_BRIEF "Security model".
          supabase functions deploy writer \
            --project-ref ssfhjhbarkpgbelnbcun \
            --no-verify-jwt

      # Reports the outcome, not the intention. The first version of this step said
      # "Deployed from the repo" unconditionally and printed that cheerfully over a
      # 401 — a summary that lies on failure is worse than no summary, because the
      # whole point of it is to be the thing you trust at a glance.
      - name: Report
        if: always()
        shell: bash
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          {
            echo "## 🚚 writer deploy"
            echo
            if [ "$DEPLOY_OUTCOME" = "success" ]; then
              echo "✅ Commit \`${GITHUB_SHA::12}\` deployed to project \`ssfhjhbarkpgbelnbcun\` with \`verify_jwt=false\`."
              echo
              echo "_Shipped from the repo — no hand-copying._"
            else
              echo "❌ **Deploy failed** (\`$DEPLOY_OUTCOME\`) — the live function is UNCHANGED and still running the previous version."
              echo
              echo "A **401** here means \`SUPABASE_ACCESS_TOKEN\` is missing, revoked, or stale:"
              echo "mint a new token at supabase.com/dashboard/account/tokens and update the"
              echo "repo secret under Settings → Secrets and variables → Actions."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
