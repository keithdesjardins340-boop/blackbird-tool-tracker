name: Deploy writer function

# The `writer` Edge Function is the ONLY write path the browser has, and until
# now it was deployed by hand-copying ~600 lines of index.ts into a deploy call.
# That made the repo the source of truth everywhere except the one file where
# being wrong is most expensive — and it has already twice pushed a fix into
# "later" purely because deploying meant retyping the file.
#
# Now: touch supabase/functions/**, and this ships it.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-writer.yml'
  workflow_dispatch:

concurrency:
  group: deploy-writer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy the writer
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set — refusing to run. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # --no-verify-jwt is REQUIRED and deliberate: this function's auth is the
          # writer token in the x-writer-token header, checked against app_secrets.
          # Deploying with JWT verification on would 401 every write from the
          # dashboard. See PROJECT_BRIEF "Security model".
          supabase functions deploy writer \
            --project-ref ssfhjhbarkpgbelnbcun \
            --no-verify-jwt

      - name: Report
        if: always()
        run: |
          {
            echo "## 🚚 writer deploy"
            echo
            echo "Commit \`${GITHUB_SHA::12}\` → project \`ssfhjhbarkpgbelnbcun\`, \`verify_jwt=false\`."
            echo
            echo "_Deployed from the repo — no hand-copying. Check the function's version in the Supabase dashboard if you want to confirm it moved._"
          } >> "$GITHUB_STEP_SUMMARY"
