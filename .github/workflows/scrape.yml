name: Scrape dealer prices

on:
  schedule:
    # GitHub cron is UTC and does NOT observe DST, so America/Winnipeg times drift
    # 1h seasonally (accepted): 13:00 UTC = 08:00 CDT (summer) / 07:00 CST (winter);
    # 01:00 UTC = 20:00 CDT (summer) / 19:00 CST (winter). Twice daily is plenty.
    - cron: '0 13 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      dealer:
        description: 'Optional: scrape a single dealer by exact name'
        required: false
        default: ''
      map_limit:
        description: 'How many unmapped tools to auto-map this run'
        required: false
        default: '20'

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Node 22+ has native WebSocket, required by @supabase/supabase-js

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Auto-map is PARKED for the manual-first model (the owner pastes links; the
      # scraper only refreshes prices). The code stays in-tree and validated; set
      # the repo variable ENABLE_AUTO_MAP='true' to bring discovery back. When
      # unset/false this step is skipped and map_limit is inert.
      # (A mapper hiccup also can't block pricing — the two steps are independent.)
      - name: Auto-map new tools to dealer listings
        if: vars.ENABLE_AUTO_MAP == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAP_LIMIT: ${{ github.event.inputs.map_limit || '20' }}
        run: node src/auto-map.js

      - name: Run scrapers
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.dealer }}" ]; then
            node src/run.js --dealer "${{ github.event.inputs.dealer }}"
          else
            node src/run.js
          fi

      # Push the buy signal to his phone (ntfy.sh — free, no account). The topic
      # is the only secret; unset → alerts.js exits quietly, so this step is inert
      # until he subscribes. `always()` so a failed run can say so itself: a
      # scraper that dies silently leaves the app showing stale prices with
      # confidence, which is the failure worth being told about.
      - name: Push alerts
        if: always()
        continue-on-error: true # a missed notification must never fail the run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ "${{ steps.scrape.outcome }}" = "success" ]; then
            node src/alerts.js
          else
            node src/alerts.js --run-failed
          fi

      # Always summarize the run (dealer health, snapshot volume, anomalies, deals)
      # into the Actions run summary — even if a prior step failed.
      - name: Run report
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node src/report.js >> "$GITHUB_STEP_SUMMARY"
