<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Blackbird Tool Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span> Blackbird <span class="muted">Tool Tracker</span>
    </div>
    <div class="topbar-actions">
      <button id="addToolBtn" class="icon-btn" title="Add a tool">＋</button>
      <button id="refreshBtn" class="icon-btn" title="Refresh">&#x21bb;</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="checklist" class="tab active">Checklist</button>
    <button data-tab="watchlist" class="tab">Prices</button>
    <button data-tab="deals" class="tab">Deals <span id="dealsCount" class="pill"></span></button>
    <button data-tab="health" class="tab">Health</button>
    <button data-tab="import" class="tab">Settings</button>
  </nav>

  <div id="staleBar" class="stalebar hidden"></div>
  <main id="view"><div class="loading">Loading…</div></main>

  <!-- Tool detail overlay -->
  <div id="detail" class="detail hidden" aria-hidden="true">
    <div class="detail-panel">
      <button id="detailClose" class="icon-btn detail-close">&times;</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
